  # =========================================================================
  # Correspondence
  # =========================================================================
  /api/v1/correspondence:
    get:
      operationId: listCorrespondence
      summary: List correspondence
      description: >
        Returns correspondence records for the organisation, optionally
        filtered by type, status, or client.
      tags: [Correspondence]
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [rfq, counter_offer, confirmation, report, settlement_instruction]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [drafted, pending_approval, sent, received, actioned, archived]
        - name: client_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Correspondence list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Correspondence'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/correspondence/inbound:
    post:
      operationId: processInboundEmail
      summary: Process inbound email
      description: >
        Submits an inbound email for AI-powered offer extraction and automatic
        thread matching. The system parses the message body, identifies pricing
        signals and quantities, and creates or updates a negotiation thread.
      tags: [Correspondence]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboundEmail'
            example:
              body: >-
                Hi, we'd like to purchase 15,000 ESCs at A$21.50 per certificate
                for delivery by end of June. Please confirm availability.
              counterpartyEmail: buyer@example.com.au
              subject: "ESC procurement enquiry"
      responses:
        '201':
          description: Inbound message processed and thread created/updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      threadId:
                        type: string
                        format: uuid
                      extractedOffer:
                        type: object
                        properties:
                          instrument:
                            $ref: '#/components/schemas/InstrumentType'
                          quantity:
                            type: integer
                          price:
                            type: number
                            format: double
                          deliveryDate:
                            type: string
                            nullable: true
                      draftResponse:
                        type: string
                        description: AI-generated draft counter-offer awaiting broker approval.
        '400':
          description: Validation error (missing body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/correspondence/procurement:
    get:
      operationId: getProcurementRecommendations
      summary: List procurement recommendations
      description: >
        Returns AI-generated procurement recommendations based on client
        compliance shortfalls and current market conditions.
      tags: [Correspondence]
      responses:
        '200':
          description: Procurement recommendations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProcurementRecommendation'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/correspondence/procurement/generate-rfqs:
    post:
      operationId: generateRfqs
      summary: Generate RFQs from recommendation
      description: >
        Generates request-for-quote correspondence from a procurement
        recommendation. The AI drafts personalised RFQ emails for known
        sellers in the platform's counterparty network.
      tags: [Correspondence]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: The procurement recommendation object to generate RFQs from.
              properties:
                recommendation_id:
                  type: string
                  format: uuid
                instrument:
                  $ref: '#/components/schemas/InstrumentType'
                quantity:
                  type: integer
                  example: 62500
                target_price:
                  type: number
                  format: double
                  example: 22.80
                client_id:
                  type: string
                  format: uuid
            example:
              recommendation_id: "e5f6a7b8-c9d0-1234-ef01-23456789abcd"
              instrument: ESC
              quantity: 62500
              target_price: 22.80
              client_id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
      responses:
        '201':
          description: RFQ correspondence generated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      generated:
                        type: integer
                        example: 3
                        description: Number of RFQ emails generated.
                      correspondence_ids:
                        type: array
                        items:
                          type: string
                          format: uuid
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/correspondence/reports:
    get:
      operationId: listReports
      summary: List generated reports
      description: >
        Returns reports generated for clients, optionally filtered by client ID.
      tags: [Correspondence]
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Report'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    post:
      operationId: generateReport
      summary: Generate a client report
      description: >
        Triggers generation of a compliance summary, trading activity, or
        settlement report for the specified client and period.
      tags: [Correspondence]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientId]
              properties:
                clientId:
                  type: string
                  format: uuid
                batch:
                  type: boolean
                  default: false
                  description: If true, generates reports for all clients.
                period:
                  type: string
                  example: "2026-Q1"
                  description: Reporting period (e.g. "2026-Q1", "2026-03").
            example:
              clientId: "c3d4e5f6-a7b8-9012-cdef-123456789012"
              period: "2026-Q1"
      responses:
        '201':
          description: Report generated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Report'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/correspondence/settlement:
    get:
      operationId: listSettlementCorrespondence
      summary: List settlement correspondence
      description: >
        Returns settlement-related correspondence including TESSA instructions
        and registry transfer confirmations.
      tags: [Correspondence]
      responses:
        '200':
          description: Settlement correspondence list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Correspondence'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/correspondence/threads:
    get:
      operationId: listThreads
      summary: List negotiation threads
      description: >
        Returns a summary of all active email negotiation threads for the
        authenticated organisation, including current pricing positions and
        concession tracking.
      tags: [Correspondence]
      responses:
        '200':
          description: Thread summaries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Thread'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/correspondence/threads/{id}:
    get:
      operationId: getThreadById
      summary: Get thread detail
      description: >
        Returns the full negotiation thread including all rounds, pricing
        history, and drafted responses.
      tags: [Correspondence]
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Full thread detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Thread'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Thread not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    post:
      operationId: submitThreadAction
      summary: Submit broker action on a thread
      description: >
        Allows the broker to approve, edit, or reject an AI-drafted
        counter-offer within a negotiation thread.
      tags: [Correspondence]
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  $ref: '#/components/schemas/ThreadAction'
                reason:
                  type: string
                  description: Reason for rejection (required when action is `reject`).
                edited_body:
                  type: string
                  description: Modified response body (required when action is `edit`).
            examples:
              approve:
                summary: Approve the drafted counter-offer
                value:
                  action: approve
              edit:
                summary: Edit before sending
                value:
                  action: edit
                  edited_body: >-
                    Thank you for your offer of A$21.50. We can meet you at
                    A$22.75 per certificate for the 15,000-unit tranche,
                    reflecting current market conditions.
              reject:
                summary: Reject the drafted response
                value:
                  action: reject
                  reason: "Price too aggressive — need to hold above A$23.00."
      responses:
        '200':
          description: Action applied to thread.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Thread'
        '400':
          description: Validation error (missing required fields for action).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Thread not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # =========================================================================
  # Webhooks
  # =========================================================================
  /api/v1/webhooks:
    get:
      operationId: listWebhooks
      summary: List registered webhooks
      description: >
        Returns all webhook registrations for the authenticated organisation.
        Secrets are redacted from the response.
      tags: [Webhooks]
      responses:
        '200':
          description: Webhook list (secrets omitted).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Webhook'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    post:
      operationId: registerWebhook
      summary: Register a webhook
      description: >
        Registers a new webhook endpoint. The signing secret is returned in the
        response and is **not retrievable afterwards** — store it securely.
        Payloads are signed with HMAC-SHA256 using this secret.
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookCreate'
            example:
              url: "https://example.com.au/webhooks/wrei"
              events:
                - trade.created
                - trade.settled
                - negotiation.completed
      responses:
        '201':
          description: Webhook registered. Secret included in response (one-time only).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/WebhookCreatedResponse'
        '400':
          description: Validation error (invalid URL or events).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    delete:
      operationId: deleteWebhook
      summary: Delete a webhook
      description: >
        Removes a webhook registration. The endpoint will no longer receive
        event deliveries.
      tags: [Webhooks]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Webhook ID to delete.
      responses:
        '200':
          description: Webhook deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean
                        example: true
                      id:
                        type: string
                        format: uuid
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Webhook not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

tags:
  - name: Market Data
    description: Real-time and historical pricing, order books, and instrument metadata.
  - name: Trading
    description: Trade management and AI-powered negotiation sessions.
  - name: Clients
    description: Client administration, holdings, and compliance tracking.
  - name: Correspondence
    description: Email negotiation threads, procurement workflows, reports, and settlement correspondence.
  - name: Webhooks
    description: Event-driven notifications delivered to registered HTTPS endpoints.
